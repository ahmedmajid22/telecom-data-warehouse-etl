version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    # Airflow Internal Config
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ahmed:password@db:5432/airflow_db
    AIRFLOW__WEBSERVER__SECRET_KEY: "supersecret"

    # 🔥 DATA PIPELINE CONFIG (Used by src/db.py)
    DB_HOST: db
    DB_PORT: 5432
    DB_USER: ahmed
    DB_PASSWORD: password
    DB_NAME: telecom_db
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data # 🚀 Ensure data is mounted
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    container_name: telecom_postgres
    environment:
      POSTGRES_USER: ahmed
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airflow_db # This creates the Airflow DB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Creates telecom_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ahmed -d airflow_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "airflow db init && airflow users create
        --username admin
        --password admin
        --firstname Ahmed
        --lastname DE
        --role Admin
        --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always

volumes:
  postgres_data:
